        description: Member of UMKM community
      - name: memiliki_nib
        description: Has NIB (business registration)
      - name: memiliki_sertifikasi_halal
        description: Has halal certification
      - name: timestamp
        description: Form submission timestamp
      - name: sheet_name
        description: Source Google Sheet name
      - name: data_source
        description: Source identifier
      - name: extracted_at
        description: Data extraction timestamp
      - name: composite_key
        description: Deduplication key (email|phone)

  - name: stg_users
    description: Staged UMKMall user accounts from Supabase
    columns:
      - name: id
        description: Primary user ID (UUID)
      - name: email
        description: User email address
      - name: created_at
        description: Account creation timestamp
        meta:
          dimension:
            type: timestamp
      - name: updated_at
        description: Account last updated timestamp
        meta:
          dimension:
            type: timestamp
      - name: role
        description: User role
      - name: eduqat_user_id
        description: Linked Eduqat user ID
      - name: name
        description: User display name
      - name: mobile
        description: User mobile phone number
      - name: mobile_verified
        description: Whether mobile is verified
      - name: mobile_verified_at
        description: Mobile verification timestamp
        meta:
          dimension:
            type: timestamp
      - name: avatar_url
        description: Profile picture URL
      - name: birth_date
        description: User birth date
      - name: address
        description: User address
      - name: city
        description: User city
      - name: province
        description: User province
      - name: postal_code
        description: User postal code
      - name: language_preference
        description: Preferred language
      - name: ai_tone_preference
        description: Preferred AI tone
      - name: interests
        description: User interests (JSONB)
      - name: level
        description: User level
      - name: voice_preference
        description: Preferred voice
      - name: latitude
        description: User latitude
      - name: longitude
        description: User longitude
      - name: segment
        description: User segment
      - name: business_name
        description: User business name
      - name: data_source
        description: Source identifier
      - name: extracted_at
        description: Data extraction timestamp
        meta:
          dimension:
            type: timestamp

  - name: stg_ai_chat_sessions
    description: Staged AI chat sessions from Supabase
    columns:
      - name: id
        description: Unique session identifier (UUID)
      - name: user_id
        description: User identifier (UUID)
      - name: guest_session_id
        description: Guest session identifier for unauthenticated users
      - name: title
        description: Chat session title
      - name: created_at
        description: Session creation timestamp
        meta:
          dimension:
            type: timestamp
      - name: updated_at
        description: Session last updated timestamp
        meta:
          dimension:
            type: timestamp
      - name: data_source
        description: Source identifier
      - name: extracted_at
        description: Data extraction timestamp
        meta:
          dimension:
            type: timestamp

  - name: stg_ai_chat_messages
    description: Staged AI chat messages from Supabase
    columns:
      - name: id
        description: Unique message identifier (UUID)
      - name: session_id
        description: Chat session identifier (UUID)
      - name: role
        description: Message sender role (user, assistant, etc.)
      - name: content
        description: Message content text
      - name: message_order
        description: Order of message within the session
        meta:
          dimension:
            type: number
      - name: created_at
        description: Message creation timestamp
        meta:
          dimension:
            type: timestamp
      - name: data_source
        description: Source identifier
      - name: extracted_at
        description: Data extraction timestamp
        meta:
          dimension:
            type: timestamp

  - name: stg_eduqat_courses
    description: Staged Eduqat course catalog
    columns:
      - name: course_id
        description: Unique course identifier
      - name: slug
        description: URL-friendly course slug
      - name: course_name
        description: Course display name
      - name: description
        description: Course description
      - name: course_type
        description: Type of course
      - name: course_status
        description: Course status (published, draft, etc.)
      - name: duration_seconds
        description: Course duration in seconds
        meta:
          dimension:
            type: number
      - name: total_student
        description: Total number of students
        meta:
          dimension:
            type: number
      - name: rating
        description: Course rating
        meta:
          dimension:
            type: number
      - name: author
        description: Course author
      - name: parent_course_id
        description: Parent course ID for sub-courses
      - name: timezone
        description: Course timezone
      - name: progress_status
        description: Course progress status
      - name: start_date
        description: Course start date
        meta:
          dimension:
            type: timestamp
      - name: end_date
        description: Course end date
        meta:
          dimension:
            type: timestamp
      - name: published_at
        description: Course publication timestamp
        meta:
          dimension:
            type: timestamp
      - name: language_codes
        description: Supported language codes (JSONB)
      - name: categories
        description: Course categories (JSONB)
      - name: educators
        description: Course educators (JSONB)
      - name: images
        description: Course images (JSONB)
      - name: prices
        description: Course pricing (JSONB)
      - name: tags
        description: Course tags (JSONB)
      - name: metadata
        description: Additional metadata (JSONB)
      - name: data_source
        description: Source identifier
      - name: extracted_at
        description: Data extraction timestamp
        meta:
          dimension:
            type: timestamp

  - name: stg_eduqat_users
    description: Staged Eduqat user accounts
    columns:
      - name: id
        description: Primary user ID
      - name: user_id
        description: User ID (same as id)
      - name: subid
        description: UUID identifier
      - name: name
        description: User display name
      - name: user_name
        description: Username
      - name: email
        description: User email address
      - name: phone_number
        description: User phone number
      - name: phone_country
        description: Phone country
      - name: phone_country_calling_code
        description: Country calling code
      - name: description
        description: User description/bio
      - name: avatar_url
        description: Profile picture URL
      - name: role
        description: User role (learner, admin, user)
      - name: status
        description: Account status (ACTIVE, CONFIRMED)
      - name: total_course
        description: Number of courses created
      - name: total_enrollment
        description: Number of course enrollments
      - name: pre_signup_at
        description: Pre-signup timestamp
      - name: confirmed_at
        description: Account confirmation timestamp
      - name: last_loggin_at
        description: Last login timestamp
      - name: created_at
        description: Account creation timestamp
      - name: stripe_customer_ids
        description: Stripe customer IDs (JSONB)
      - name: metadata
        description: Additional metadata (JSONB)
      - name: data_source
        description: Source identifier
      - name: extracted_at
        description: Data extraction timestamp

  - name: stg_eduqat_enrollments
    description: Staged Eduqat course enrollments
    columns:
      - name: enrollment_id
        description: Unique enrollment ID
      - name: uid
        description: UID
      - name: user_id
        description: User ID
      - name: course_id
        description: Course ID
      - name: price_id
        description: Price ID
      - name: schedule_id
        description: Schedule ID
      - name: order_uid
        description: Order UID
      - name: user_name
        description: User name (from user_data JSONB)
      - name: user_email
        description: User email (from user_data JSONB)
      - name: user_phone
        description: User phone (from user_data JSONB)
      - name: user_role
        description: User role (from user_data JSONB)
      - name: user_status
        description: User status (from user_data JSONB)
      - name: user_created_at
        description: User creation timestamp (from user_data JSONB)
      - name: enrollment_started_at
        description: Enrollment start timestamp
      - name: completed_at
        description: Completion timestamp
      - name: expires_at
        description: Expiration timestamp
      - name: created_at
        description: Enrollment creation timestamp
      - name: learning_progress
        description: Learning progress percentage (0-100)
      - name: learning_time
        description: Total learning time in seconds
      - name: total_tracked_time
        description: Total tracked time from metadata
      - name: last_tracked_at
        description: Last tracking timestamp
      - name: enrollment_type
        description: Type of enrollment
      - name: timezone
        description: User timezone
      - name: order_data
        description: Order data (JSONB)
      - name: prakerja_id
        description: Prakerja program ID
      - name: is_prakerja_user
        description: Whether user is in Prakerja program
      - name: prakerja_redeem_code
        description: Prakerja redemption code
      - name: prakerja_redeem_at
        description: Prakerja redemption timestamp
      - name: certificate_count
        description: Number of certificates earned
      - name: user_data
        description: Full user data (JSONB)
      - name: metadata
        description: Enrollment metadata (JSONB)
      - name: completions
        description: Completion details (JSONB)
      - name: certificates
        description: Certificate details (JSONB)
      - name: user_groups
        description: User groups (JSONB)
      - name: user_group_admins
        description: User group admins (JSONB)
      - name: data_source
        description: Source identifier
      - name: extracted_at
        description: Data extraction timestamp

  - name: stg_enrollment_materials
    description: Staged enrollment materials unnested from eduqat_enrollments metadata. One row per material per enrollment.
    columns:
      - name: enrollment_id
        description: Enrollment ID (foreign key to stg_eduqat_enrollments)
      - name: user_id
        description: User ID
      - name: course_id
        description: Course ID
      - name: material_id
        description: Material ID (extracted from JSONB key)
      - name: material_type
        description: Type of material (video, text, rich_text, self-assessment, ai_tutor, etc.)
      - name: is_required
        description: Whether the material is required for course completion
      - name: started_at
        description: Timestamp when user started the material
      - name: completed_at
        description: Timestamp when user completed the material
      - name: tracked_time_seconds
        description: Time spent on material in seconds
      - name: ai_tutor_status
        description: Status for AI tutor materials (DONE, etc.)
      - name: conversation_id
        description: AI tutor conversation ID
      - name: conversation_started_at
        description: AI tutor conversation start timestamp
      - name: conversation_ended_at
        description: AI tutor conversation end timestamp
      - name: submission_count
        description: Number of submissions for AI tutor
      - name: self_assessment_id
        description: Self-assessment ID
      - name: self_assessment_library_id
        description: Self-assessment library ID
      - name: require_feedback
        description: Whether self-assessment requires feedback
      - name: require_file_upload
        description: Whether self-assessment requires file upload
      - name: require_educator_approval
        description: Educator approval requirement level

  - name: stg_eduqat_ai_conversations
    description: Staged AI tutor conversation messages from Eduqat. One row per message, unnested from conversation data.
    columns:
      - name: submission_id
        description: Unique submission ID for the conversation
      - name: conversation_id
        description: Unique conversation/session identifier
      - name: user_id
        description: UUID of the user
      - name: enrollment_id
        description: Links to the user's enrollment
      - name: course_id
        description: Course identifier
      - name: material_id
        description: Material/lesson identifier where conversation occurred
      - name: conversation_status
        description: Conversation status (WAITING, COMPLETED, etc.)
      - name: score
        description: Score if graded
      - name: content
        description: Additional content field
      - name: audio_url
        description: Audio URL if voice conversation
      - name: x_site_id
        description: Site identifier (e.g., umkmall)
      - name: educator_id
        description: Educator ID if assigned
      - name: conversation_created_at
        description: Timestamp when conversation was created
      - name: conversation_updated_at
        description: Timestamp when conversation was last updated
      - name: message_session_id
        description: Session ID for the message (same as conversation_id)
      - name: message_sender
        description: Message sender - 'ai' or 'human'
      - name: message_content
        description: The actual message text content
      - name: message_timestamp
        description: Timestamp when the message was sent
      - name: message_order
        description: Order of the message within the conversation (1-indexed)
      - name: data_source
        description: Source identifier
      - name: extracted_at
        description: Data extraction timestamp

  - name: stg_eduqat_survey_results
    description: Staged survey results from Eduqat API. One row per question per survey response, unnested from the elements array.
    columns:
      - name: enrollment_id
        description: Enrollment ID (foreign key to stg_eduqat_enrollments)
      - name: material_id
        description: Material ID of the survey in the course
      - name: question_index
        description: Zero-based index of the question within the survey
      - name: survey_id
        description: Unique survey identifier
      - name: course_id
        description: Course ID
      - name: user_id
        description: User ID who completed the survey
      - name: survey_type
        description: Type of survey (e.g., 'survey')
      - name: survey_title
        description: Title of the survey
      - name: question_text
        description: The survey question text
      - name: question_description
        description: Additional description/context for the question (HTML)
      - name: question_type
        description: Type of question (text, radiogroup, dropdown, checkbox, rating, linear_scale)
      - name: responses
        description: JSONB array of response values for this question
      - name: completed_at
        description: Timestamp when the survey was completed
      - name: data_source
        description: Source identifier
      - name: extracted_at
        description: Data extraction timestamp