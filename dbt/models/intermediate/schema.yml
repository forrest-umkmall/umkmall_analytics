version: 2

models:
  - name: int_all_marketing_leads
    description: Union of all marketing lead sources from Google Sheets
    columns:
      - name: email
        description: Normalized lead email
      - name: phone_number
        description: Normalized lead phone (+62 format)
      - name: nama_usaha
        description: Business name
      - name: nama_pemilik_usaha
        description: Business owner name
      - name: nama_akun_media_sosial
        description: Social media account name
      - name: nama_akun_ecommerce
        description: E-commerce account name
      - name: bidang_usaha
        description: Business sector/field
      - name: lama_usaha
        description: Business duration/age
      - name: provinsi_usaha
        description: Province of business
      - name: pendapatan_bulanan
        description: Monthly revenue
      - name: tergabung_komunitas_umkm
        description: Member of UMKM community
      - name: memiliki_nib
        description: Has NIB (business registration)
      - name: memiliki_sertifikasi_halal
        description: Has halal certification
      - name: timestamp
        description: Form submission timestamp
      - name: sheet_name
        description: Source Google Sheet name
      - name: data_source
        description: Source identifier
      - name: extracted_at
        description: Data extraction timestamp

  - name: int_ai_chat_messages
    description: AI chat messages joined with session data to include user information
    columns:
      - name: message_id
        description: Unique message identifier (UUID)
      - name: session_id
        description: Chat session identifier (UUID)
      - name: user_id
        description: User identifier (UUID) from the session
      - name: user_email
        description: User email address (from users table)
      - name: user_mobile
        description: User mobile phone number (from users table)
      - name: guest_session_id
        description: Guest session identifier for unauthenticated users
      - name: session_title
        description: Title of the chat session
      - name: role
        description: Message sender role (user, assistant, etc.)
      - name: content
        description: Message content text
      - name: message_order
        description: Order of message within the session
      - name: message_created_at
        description: Timestamp when message was created
      - name: is_internal_user
        description: Whether the user is an internal team member, based on mobile phone number
      - name: user_created_at
        description: Timestamp when the user account was created
        meta:
          dimension:
            type: timestamp
      - name: session_created_at
        description: Timestamp when session was created
      - name: session_updated_at
        description: Timestamp when session was last updated

  - name: int_user_retention
    description: Per-user retention flags based on whether the user sent at least one message after N days from account creation
    columns:
      - name: user_id
        description: User identifier (UUID)
      - name: user_email
        description: User email address
      - name: user_mobile
        description: User mobile phone number
      - name: user_created_at
        description: Timestamp when the user account was created
        meta:
          dimension:
            type: timestamp
      - name: first_message_at
        description: Timestamp of the user's first message
        meta:
          dimension:
            type: timestamp
      - name: last_message_at
        description: Timestamp of the user's most recent message
        meta:
          dimension:
            type: timestamp
      - name: total_messages
        description: Total number of messages sent by the user
      - name: active_days
        description: Number of distinct days the user sent messages
      - name: retained_7d
        description: Whether the user sent a message at least 7 days after account creation
        meta:
          metrics:
            retained_7d_count:
              type: sum
              label: "Retained 7d (count)"
              description: Number of users retained after 7 days
      - name: retained_14d
        description: Whether the user sent a message at least 14 days after account creation
        meta:
          metrics:
            retained_14d_count:
              type: sum
              label: "Retained 14d (count)"
              description: Number of users retained after 14 days
      - name: retained_30d
        description: Whether the user sent a message at least 30 days after account creation
        meta:
          metrics:
            retained_30d_count:
              type: sum
              label: "Retained 30d (count)"
              description: Number of users retained after 30 days
      - name: retained_60d
        description: Whether the user sent a message at least 60 days after account creation
        meta:
          metrics:
            retained_60d_count:
              type: sum
              label: "Retained 60d (count)"
              description: Number of users retained after 60 days
      - name: retained_90d
        description: Whether the user sent a message at least 90 days after account creation
        meta:
          metrics:
            retained_90d_count:
              type: sum
              label: "Retained 90d (count)"
              description: Number of users retained after 90 days